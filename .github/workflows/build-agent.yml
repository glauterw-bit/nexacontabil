name: Build Desktop Agent

# Dispara em tag (formato `agent-v1.2.3`) ou manual.
# Compila o agente Electron para Windows x64 e publica como GitHub Release.

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Publicar como GitHub Release?'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        working-directory: agent
        run: npm install --no-audit --no-fund

      - name: Build TypeScript
        working-directory: agent
        run: npm run build

      - name: Package Windows installer (NSIS)
        working-directory: agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --win --x64 --publish ${{ (github.event_name == 'push' || inputs.release) && 'always' || 'never' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexacontabil-agent-windows-x64
          path: |
            agent/release/*.exe
            agent/release/latest.yml
          retention-days: 90
