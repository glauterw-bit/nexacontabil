name: Build Desktop Agent

on:
  push:
    tags:
      - 'agent-v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Publicar como GitHub Release?'
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Setup Python (para node-gyp compilar better-sqlite3)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: agent
        env:
          npm_config_build_from_source: 'true'
        run: npm ci --no-audit --no-fund --include=optional || npm install --no-audit --no-fund

      - name: Build TypeScript
        working-directory: agent
        run: npm run build

      - name: Rebuild native modules for Electron
        working-directory: agent
        run: npx @electron/rebuild

      - name: Package Windows installer (NSIS)
        working-directory: agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: npx electron-builder --win --x64 --publish ${{ (github.event_name == 'push' || inputs.release) && 'always' || 'never' }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexacontabil-agent-windows-x64
          path: |
            agent/release/*.exe
            agent/release/latest.yml
          retention-days: 90
          if-no-files-found: warn

  build-mac:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: agent/package-lock.json

      - name: Setup Python (para node-gyp compilar better-sqlite3)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        working-directory: agent
        env:
          npm_config_build_from_source: 'true'
        run: npm ci --no-audit --no-fund --include=optional || npm install --no-audit --no-fund

      - name: Build TypeScript
        working-directory: agent
        run: npm run build

      - name: Rebuild native modules for Electron
        working-directory: agent
        run: npx @electron/rebuild

      - name: Package macOS installer (DMG)
        working-directory: agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Sem signing por enquanto — usuario precisa permitir em System Preferences
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --mac --x64 --arm64 --publish ${{ (github.event_name == 'push' || inputs.release) && 'always' || 'never' }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nexacontabil-agent-mac
          path: |
            agent/release/*.dmg
            agent/release/*.yml
          retention-days: 90
          if-no-files-found: warn
